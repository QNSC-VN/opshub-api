# =============================================================================
# CI — fast quality gates on every PR and push to main
# Gate: lint → typecheck → unit tests → e2e tests → docker build → openapi diff
# Security scans (Trivy, CodeQL) live in security.yml — independently runnable.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.2'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Lint + typecheck (fast gate — no DB needed)
  # ─────────────────────────────────────────────────────────────────────────
  quality:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: QNSC-VN/qnsc-gitops/actions/setup-node-pnpm@v1.0.5
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Unit + e2e tests (needs Postgres)
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opshub_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - uses: QNSC-VN/qnsc-gitops/actions/setup-node-pnpm@v1.0.5
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opshub_test?sslmode=disable

      - name: Generate ephemeral JWT keypair for tests
        # Generates a fresh EC P-256 keypair per CI run — never reuse a static secret.
        # Keys are exported as base64-encoded PEM to $GITHUB_ENV for use in test steps.
        run: |
          node - << 'EOF'
          const { generateKeyPairSync } = require('crypto');
          const fs = require('fs');
          const { privateKey, publicKey } = generateKeyPairSync('ec', {
            namedCurve: 'P-256',
            privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
            publicKeyEncoding:  { type: 'spki',  format: 'pem' },
          });
          fs.appendFileSync(process.env.GITHUB_ENV, `CI_JWT_PRIVATE_KEY=${Buffer.from(privateKey).toString('base64')}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `CI_JWT_PUBLIC_KEY=${Buffer.from(publicKey).toString('base64')}\n`);
          console.log('JWT keypair generated');
          EOF

      - name: Unit tests (with coverage)
        run: pnpm test:cov
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opshub_test?sslmode=disable
          JWT_PRIVATE_KEY: ${{ env.CI_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ env.CI_JWT_PUBLIC_KEY }}
          JWT_ACCESS_EXPIRY: 8h
          JWT_ISSUER: opshub-api
          JWT_AUDIENCE: opshub-web
          CORS_ORIGINS: http://localhost:5173
          LOG_LEVEL: silent
          OTEL_ENABLED: 'false'
          OTEL_SERVICE_NAME: opshub-api-test

      - name: E2E tests
        run: pnpm test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opshub_test?sslmode=disable
          JWT_PRIVATE_KEY: ${{ env.CI_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ env.CI_JWT_PUBLIC_KEY }}
          JWT_ACCESS_EXPIRY: 8h
          JWT_ISSUER: opshub-api
          JWT_AUDIENCE: opshub-web
          CORS_ORIGINS: http://localhost:5173
          LOG_LEVEL: silent
          OTEL_ENABLED: 'false'
          OTEL_SERVICE_NAME: opshub-api-test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Docker build validation (BuildKit cache, no push)
  #    Runs after tests to avoid wasting compute on broken code.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build api image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: api
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build migrator image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: migrator
          push: false
          cache-from: type=gha,scope=migrator
          cache-to: type=gha,mode=max,scope=migrator

      - name: Build worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: worker
          push: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  # ─────────────────────────────────────────────────────────────────────────
  # 4. OpenAPI spec — generate and check for breaking changes on PRs.
  #    Publishes the spec as an artifact so the FE repo can download it.
  # ─────────────────────────────────────────────────────────────────────────
  openapi:
    name: OpenAPI contract
    runs-on: ubuntu-latest
    needs: [quality]

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opshub_openapi
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 5s --health-retries 10

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: QNSC-VN/qnsc-gitops/actions/setup-node-pnpm@v1.0.5
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opshub_openapi?sslmode=disable

      - name: Generate ephemeral JWT keypair
        run: |
          node - << 'EOF'
          const { generateKeyPairSync } = require('crypto');
          const fs = require('fs');
          const { privateKey, publicKey } = generateKeyPairSync('ec', {
            namedCurve: 'P-256',
            privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
            publicKeyEncoding:  { type: 'spki',  format: 'pem' },
          });
          fs.appendFileSync(process.env.GITHUB_ENV, `CI_JWT_PRIVATE_KEY=${Buffer.from(privateKey).toString('base64')}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `CI_JWT_PUBLIC_KEY=${Buffer.from(publicKey).toString('base64')}\n`);
          EOF

      - name: Build api
        run: pnpm build:api

      - name: Start API and capture OpenAPI spec
        run: |
          node dist/apps/api/apps/api/src/main.js &
          API_PID=$!
          echo "API_PID=$API_PID" >> "$GITHUB_ENV"
          # Poll until ready (max 30s)
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/healthz && break || sleep 1
          done
          curl -sf http://localhost:3000/api/docs-json -o openapi.json
          kill "$API_PID" || true
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opshub_openapi?sslmode=disable
          JWT_PRIVATE_KEY: ${{ env.CI_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ env.CI_JWT_PUBLIC_KEY }}
          JWT_ACCESS_EXPIRY: 8h
          JWT_ISSUER: opshub-api
          JWT_AUDIENCE: opshub-web
          CORS_ORIGINS: http://localhost:5173
          LOG_LEVEL: silent
          OTEL_ENABLED: 'false'
          OTEL_SERVICE_NAME: opshub-api

      - name: Upload OpenAPI spec artifact
        uses: actions/upload-artifact@v7
        with:
          name: openapi-spec
          path: openapi.json
          retention-days: 30

      - name: Check for breaking API changes (PR only)
        if: github.event_name == 'pull_request'
        uses: QNSC-VN/qnsc-gitops/actions/validate-openapi-contract@v1.0.5
        with:
          current-spec: openapi.json
          base-branch: ${{ github.base_ref }}

  pr-title:
    name: PR title (conventional commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            perf
            security
            chore
            ci
            deps
            docs
            test
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.
