# =============================================================================
# Deploy — Build, push to ECR, migrate, then update ECS services
#
# Triggers:
#   develop → push to main (auto)
#   prod    → push a semver tag  v*.*.*  (requires "production" environment
#             approval in GitHub Settings → Environments)
#
# Authentication: GitHub OIDC → AWS IAM (no stored AWS keys).
# Prerequisites:
#   - opshub-infra (or platform-infra) has provisioned ECR repos + ECS services
#   - GitHub repository secrets:
#       AWS_ACCOUNT_ID        (12-digit, no hyphens)
#       AWS_REGION            (e.g. ap-southeast-1)
#   - GitHub environments: "develop", "production"
#     Each environment has env-scoped vars:
#       ECS_CLUSTER           (e.g. opshub-develop)
#       ECS_API_SERVICE       (e.g. api)
#       ECS_WORKER_SERVICE    (e.g. worker)
#       ECS_MIGRATOR_TASK_DEF (e.g. opshub-develop-migrator)
#       ECS_MIGRATOR_SUBNET   (private subnet ID for the migration task)
#       ECS_MIGRATOR_SG       (security group allowing outbound to RDS)
# =============================================================================
name: Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel a running deploy

permissions: {}

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.2'
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Resolve target environment and image tag from the trigger.
  # ─────────────────────────────────────────────────────────────────────────
  context:
    name: Resolve context
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      image_tag:   ${{ steps.ctx.outputs.image_tag }}
    steps:
      - name: Determine env + tag
        id: ctx
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=develop" >> "$GITHUB_OUTPUT"
            echo "image_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Build and push all three images (api, worker, migrator) to ECR.
  # ─────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & push to ECR
    runs-on: ubuntu-latest
    needs: context
    permissions:
      id-token: write
      contents: read

    env:
      IMAGE_TAG: ${{ needs.context.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: nghiavan0610/qncs-gitops/actions/setup-aws-oidc@947bc9bd8e130065082f9a2e15e4f61cfbb736ca
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/opshub-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Build & push api
        uses: nghiavan0610/qncs-gitops/actions/build-push-ecr@947bc9bd8e130065082f9a2e15e4f61cfbb736ca
        with:
          ecr-registry: ${{ env.ECR_REGISTRY }}
          image-name: opshub-api
          image-tag: ${{ env.IMAGE_TAG }}
          dockerfile-target: api
          cache-scope: api

      - name: Build & push worker
        uses: nghiavan0610/qncs-gitops/actions/build-push-ecr@947bc9bd8e130065082f9a2e15e4f61cfbb736ca
        with:
          ecr-registry: ${{ env.ECR_REGISTRY }}
          image-name: opshub-worker
          image-tag: ${{ env.IMAGE_TAG }}
          dockerfile-target: worker
          cache-scope: worker

      - name: Build & push migrator
        uses: nghiavan0610/qncs-gitops/actions/build-push-ecr@947bc9bd8e130065082f9a2e15e4f61cfbb736ca
        with:
          ecr-registry: ${{ env.ECR_REGISTRY }}
          image-name: opshub-migrator
          image-tag: ${{ env.IMAGE_TAG }}
          dockerfile-target: migrator
          cache-scope: migrator

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy — gate, migrate, update ECS, verify.
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ needs.context.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [context, build-push]
    environment: ${{ needs.context.outputs.environment }}
    permissions:
      id-token: write
      contents: read

    env:
      IMAGE_TAG:   ${{ needs.context.outputs.image_tag }}
      ENVIRONMENT: ${{ needs.context.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: nghiavan0610/qncs-gitops/actions/setup-aws-oidc@947bc9bd8e130065082f9a2e15e4f61cfbb736ca
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/opshub-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Run DB migrations
        uses: nghiavan0610/qncs-gitops/actions/ecs-run-task@947bc9bd8e130065082f9a2e15e4f61cfbb736ca
        with:
          cluster: ${{ vars.ECS_CLUSTER }}
          task-definition: ${{ vars.ECS_MIGRATOR_TASK_DEF }}
          subnet: ${{ vars.ECS_MIGRATOR_SUBNET }}
          security-group: ${{ vars.ECS_MIGRATOR_SG }}
          overrides: |
            {"containerOverrides":[{"name":"migrator","image":"${{ env.ECR_REGISTRY }}/opshub-migrator:${{ env.IMAGE_TAG }}"}]}

      - name: Update API service
        uses: nghiavan0610/qncs-gitops/actions/ecs-run-task@947bc9bd8e130065082f9a2e15e4f61cfbb736ca
        with:
          cluster: ${{ vars.ECS_CLUSTER }}
          service: ${{ vars.ECS_API_SERVICE }}
          image: ${{ env.ECR_REGISTRY }}/opshub-api:${{ env.IMAGE_TAG }}

      - name: Update Worker service
        uses: nghiavan0610/qncs-gitops/actions/ecs-run-task@947bc9bd8e130065082f9a2e15e4f61cfbb736ca
        with:
          cluster: ${{ vars.ECS_CLUSTER }}
          service: ${{ vars.ECS_WORKER_SERVICE }}
          image: ${{ env.ECR_REGISTRY }}/opshub-worker:${{ env.IMAGE_TAG }}

      - name: Verify deployment health
        uses: nghiavan0610/qncs-gitops/actions/verify-ecs-deploy@947bc9bd8e130065082f9a2e15e4f61cfbb736ca
        with:
          cluster: ${{ vars.ECS_CLUSTER }}
          services: "${{ vars.ECS_API_SERVICE }},${{ vars.ECS_WORKER_SERVICE }}"

      - name: Notify deploy
        if: always()
        uses: nghiavan0610/qncs-gitops/actions/notify-deploy@947bc9bd8e130065082f9a2e15e4f61cfbb736ca
        with:
          environment: ${{ env.ENVIRONMENT }}
          image-tag: ${{ env.IMAGE_TAG }}
          status: ${{ job.status }}
