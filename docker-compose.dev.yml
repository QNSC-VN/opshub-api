services:
  postgres:
    image: postgres:18-alpine
    container_name: opshub-postgres
    environment:
      POSTGRES_USER: opshub
      POSTGRES_PASSWORD: opshub
      POSTGRES_DB: opshub
    ports:
      # 5433 avoids conflict with other local Postgres instances (e.g. rally on 5432).
      - '5433:5432'
    volumes:
      - opshub_pgdata:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U opshub']
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: opshub-valkey
    ports:
      # 6380 avoids conflict with other local Redis/Valkey instances (e.g. rally on 6379).
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  opshub_pgdata:
